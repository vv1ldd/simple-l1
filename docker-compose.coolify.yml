services:
  sl1-node:
    build:
      context: ./node
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      NODE_NAME: ${NODE_NAME:-simplel1-online}
      NETWORK_NAME: ${NETWORK_NAME:-Simple-L1 Alpha}
      PEERS: ${PEERS:-https://l1.wildflow.dev,https://l1-beta.wildflow.dev,https://l1-gamma.wildflow.dev}
      SL1_DATA_DIR: /data
      SL1_CONNECT_SECRET: ${SL1_CONNECT_SECRET:-}
    expose:
      - "3000"
    volumes:
      - sl1-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthcheck').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  sl1-data:
