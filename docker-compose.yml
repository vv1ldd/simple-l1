version: '3.8'

services:
  sl1-node:
    image: node:20-slim
    container_name: simple-l1-node
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_NAME=${NODE_NAME:-community-node}
      - PEERS=${PEERS:-https://l1.wildflow.dev}
      - PORT=3000
    volumes:
      - .:/app
    command: >
      sh -c "npm install && node server.js"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
