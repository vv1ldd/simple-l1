version: '3.8'

services:
  sl1-node:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - SL1_DATA_DIR=/data
    volumes:
      - sl1-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sl1-node.rule=Host(`l1.wildflow.dev`) || Host(`simplel1.online`) || Host(`connect.simplel1.online`)"
      - "traefik.http.routers.sl1-node.entrypoints=https"
      - "traefik.http.routers.sl1-node.tls=true"
      - "traefik.http.services.sl1-node.loadbalancer.server.port=3000"
    restart: always

volumes:
  sl1-data:
