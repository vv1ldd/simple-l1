name: Contract Validation

on:
  push:
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: node/package-lock.json

      - run: node --version
      - run: npm --version
      - run: npm ci
      - run: npm run contracts:validate
